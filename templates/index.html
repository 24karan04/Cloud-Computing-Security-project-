<!DOCTYPE html>
<html>
<head>
    <title>Cloud Security System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
            color: #38bdf8;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .box {
            background: #1e293b;
            margin: 15px;
            padding: 20px;
            width: 280px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 8px 15px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<h1>🔐 Cloud Security System</h1>

<div class="container">

<div class="box">
    <h3>Register</h3>
    <form action="/register" method="post">
        <input name="u" placeholder="Username"><br>
        <input name="p" placeholder="Password"><br>
        <button>Register</button>
    </form>
</div>

<div class="box">
    <h3>Login</h3>
    <form action="/login" method="post">
        <input name="u"><br>
        <input name="p"><br>
        <button>Login</button>
    </form>
</div>

<div class="box">
    <h3>Encrypt</h3>
    <form action="/encrypt" method="post">
        <input name="file"><br>
        <button>Encrypt</button>
    </form>
</div>

<div class="box">
    <h3>Decrypt</h3>
    <form action="/decrypt" method="post">
        <input name="file"><br>
        <button>Decrypt</button>
    </form>
</div>

<div class="box">
    <h3>Integrity</h3>
    <form action="/hash" method="post">
        <input name="file"><br>
        <button>Check</button>
    </form>
</div>

<div class="box">
    <h3>Firewall</h3>
    <form action="/block" method="post">
        <input name="ip"><br>
        <button>Block</button>
    </form>
    <form action="/allow" method="post">
        <input name="ip"><br>
        <button>Allow</button>
    </form>
    <form action="/check" method="post">
        <input name="ip"><br>
        <button>Check</button>
    </form>
</div>

</div>

</body>
</html>
