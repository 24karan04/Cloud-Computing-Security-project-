<!DOCTYPE html>
<html>
<head>
    <title>Cloud Security</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
            text-align: center;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px black;
        }
        input {
            padding: 10px;
            width: 90%;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 15px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>🔐 Cloud Security System</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
<p style="color:yellow;">{{ messages[0] }}</p>
{% endif %}
{% endwith %}

<div class="box">
<h3>Register</h3>
<form action="/register" method="post">
<input name="u" placeholder="Username">
<input name="p" placeholder="Password">
<button>Register</button>
</form>
</div>

<div class="box">
<h3>Login</h3>
<form action="/login" method="post">
<input name="u" placeholder="Username">
<input name="p" placeholder="Password">
<button>Login</button>
</form>
</div>

</body>
</html>
