<!DOCTYPE html>
<html>
<head>
    <title>Cloud Security</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            font-family: Arial;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, button {
            margin: 5px;
            padding: 10px;
            width: 90%;
        }
    </style>
</head>
<body>

<h1>🔐 Cloud Security System</h1>

<div class="box">
<h3>Register</h3>
<form action="/register" method="post">
<input name="u" placeholder="Username">
<input name="p" placeholder="Password">
<button>Register</button>
</form>
</div>

<div class="box">
<h3>Login</h3>
<form action="/login" method="post">
<input name="u" placeholder="Username">
<input name="p" placeholder="Password">
<button>Login</button>
</form>
</div>

</body>
</html>
